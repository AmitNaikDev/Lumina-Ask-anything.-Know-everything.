version: "3.9"

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumina_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      # Persist ChromaDB data across restarts
      - ./chroma_store:/app/chroma_store
      # Persist uploaded files
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - CHROMA_PERSIST_DIR=/app/chroma_store
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Streamlit frontend ───────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumina_ui
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      # Points UI to the API service by container name — not localhost
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_store:
  data:
